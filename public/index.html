<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alertis Quiz</title>
<link rel="stylesheet" href="/css/index.css" />
<link rel="stylesheet" href="/css/floaters.css" />
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="floaters" aria-hidden="true">
    <span class="fl" style="left:5%;top:12%;font-size:2.2rem;animation-delay:0s;animation-duration:7s;">🦊</span>
    <span class="fl" style="left:88%;top:8%;font-size:1.8rem;animation-delay:-2s;animation-duration:9s;">🦉</span>
    <span class="fl" style="left:14%;top:72%;font-size:2rem;animation-delay:-4s;animation-duration:8s;">🐬</span>
    <span class="fl" style="left:80%;top:65%;font-size:2.4rem;animation-delay:-1s;animation-duration:11s;">🐯</span>
    <span class="fl" style="left:50%;top:5%;font-size:1.6rem;animation-delay:-6s;animation-duration:10s;">🦋</span>
    <span class="fl" style="left:92%;top:40%;font-size:1.9rem;animation-delay:-3s;animation-duration:7s;">🌟</span>
    <span class="fl" style="left:3%;top:45%;font-size:1.7rem;animation-delay:-5s;animation-duration:12s;">🎲</span>
    <span class="fl" style="left:70%;top:88%;font-size:2rem;animation-delay:-7s;animation-duration:9s;">🏆</span>
    <span class="fl" style="left:28%;top:88%;font-size:1.8rem;animation-delay:-2.5s;animation-duration:8s;">🧠</span>
    <span class="fl" style="left:60%;top:18%;font-size:1.6rem;animation-delay:-8s;animation-duration:13s;">🎮</span>
    <span class="fl" style="left:38%;top:78%;font-size:1.5rem;animation-delay:-1.5s;animation-duration:6s;">💡</span>
    <span class="fl" style="left:76%;top:28%;font-size:2.1rem;animation-delay:-9s;animation-duration:10s;">🐙</span>
  </div>

  <div class="content">
    <div class="logo-wrap">
      <span class="logo-icon">⚡</span>
      <div class="logo-text">Alertis Quiz</div>
    </div>
    <div class="tagline">Quiz interactif en temps réel pour vos formations</div>

    <div class="cards">
      <a href="/admin.html" class="card card-admin">
        <div class="card-icon">🛠️</div>
        <div class="card-title">Organisateur</div>
        <div class="card-desc">Crée tes quiz et lance les parties</div>
        <button class="card-btn btn-admin">Tableau de bord</button>
      </a>
      <a href="/play.html" class="card card-player">
        <div class="card-icon">🎯</div>
        <div class="card-title">Participant</div>
        <div class="card-desc">Rejoins une partie avec un code</div>
        <button class="card-btn btn-player">Rejoindre</button>
      </a>
    </div>
  </div>

  <div class="footer">Alertis Formation · Quiz interactif</div>
</body>
</html>
