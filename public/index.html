<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alertis Quiz</title>
<link rel="stylesheet" href="/css/index.css" />
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="content">
    <div class="logo-wrap">
      <span class="logo-icon">⚡</span>
      <div class="logo-text">Alertis Quiz</div>
    </div>
    <div class="tagline">Quiz interactif en temps réel pour vos formations</div>

    <div class="cards">
      <a href="/admin.html" class="card card-admin">
        <div class="card-icon">🛠️</div>
        <div class="card-title">Organisateur</div>
        <div class="card-desc">Crée tes quiz et lance les parties</div>
        <button class="card-btn btn-admin">Tableau de bord</button>
      </a>
      <a href="/play.html" class="card card-player">
        <div class="card-icon">🎯</div>
        <div class="card-title">Participant</div>
        <div class="card-desc">Rejoins une partie avec un code</div>
        <button class="card-btn btn-player">Rejoindre</button>
      </a>
    </div>
  </div>

  <div class="footer">Alertis Formation · Quiz interactif</div>
</body>
</html>
