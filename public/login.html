<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alertis Quiz — Connexion</title>
<link rel="stylesheet" href="/css/login.css" />
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>

<div class="container">
  <div class="logo-wrap">
    <span class="logo-icon">⚡</span>
    <div class="logo-text">Alertis Quiz</div>
    <div class="logo-sub">Espace organisateur</div>
  </div>

  <div class="card">
    <h2>🔐 Connexion</h2>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div class="err" id="err-msg"></div>
    <button class="btn" id="btn-login" onclick="login()">Se connecter</button>
  </div>

  <div class="back"><a href="/">← Retour à l'accueil</a></div>
</div>

<script>
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('err-msg');
  err.textContent = '';
  if (!email || !password) { err.textContent = 'Remplis tous les champs'; return; }
  btn.disabled = true; btn.textContent = 'Connexion…';
  try {
    const res = await fetch('/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (res.ok) { window.location.href = '/admin.html'; }
    else { err.textContent = data.error || 'Erreur de connexion'; btn.disabled = false; btn.textContent = 'Se connecter'; }
  } catch (e) { err.textContent = 'Erreur réseau'; btn.disabled = false; btn.textContent = 'Se connecter'; }
}
</script>
</body>
</html>
