<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alertis Quiz — Connexion</title>
<link rel="stylesheet" href="/css/login.css" />
<link rel="stylesheet" href="/css/floaters.css" />
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>

<div class="floaters" aria-hidden="true">
  <span class="fl" style="left:5%;top:12%;font-size:4.2rem;animation-delay:0s;animation-duration:7s;">🦊</span>
  <span class="fl" style="left:88%;top:8%;font-size:3.4rem;animation-delay:-2s;animation-duration:9s;">🦉</span>
  <span class="fl" style="left:14%;top:72%;font-size:3.8rem;animation-delay:-4s;animation-duration:8s;">🐬</span>
  <span class="fl" style="left:80%;top:65%;font-size:4.5rem;animation-delay:-1s;animation-duration:11s;">🐯</span>
  <span class="fl" style="left:50%;top:5%;font-size:3rem;animation-delay:-6s;animation-duration:10s;">🦋</span>
  <span class="fl" style="left:92%;top:40%;font-size:3.6rem;animation-delay:-3s;animation-duration:7s;">🌟</span>
  <span class="fl" style="left:3%;top:45%;font-size:3.2rem;animation-delay:-5s;animation-duration:12s;">🎲</span>
  <span class="fl" style="left:70%;top:88%;font-size:3.8rem;animation-delay:-7s;animation-duration:9s;">🏆</span>
  <span class="fl" style="left:28%;top:88%;font-size:3.4rem;animation-delay:-2.5s;animation-duration:8s;">🧠</span>
  <span class="fl" style="left:60%;top:18%;font-size:3rem;animation-delay:-8s;animation-duration:13s;">🎮</span>
  <span class="fl" style="left:38%;top:78%;font-size:2.8rem;animation-delay:-1.5s;animation-duration:6s;">💡</span>
  <span class="fl" style="left:76%;top:28%;font-size:4rem;animation-delay:-9s;animation-duration:10s;">🐙</span>
</div>

<div class="container">
  <div class="logo-wrap">
    <span class="logo-icon">⚡</span>
    <div class="logo-text">Alertis Quiz</div>
    <div class="logo-sub">Espace organisateur</div>
  </div>

  <div class="card">
    <h2>🔐 Connexion</h2>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div class="err" id="err-msg"></div>
    <button class="btn" id="btn-login" onclick="login()">Se connecter</button>
  </div>

  <div class="back"><a href="/">← Retour à l'accueil</a></div>
</div>

<script>
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('err-msg');
  err.textContent = '';
  if (!email || !password) { err.textContent = 'Remplis tous les champs'; return; }
  btn.disabled = true; btn.textContent = 'Connexion…';
  try {
    const res = await fetch('/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (res.ok) { window.location.href = '/admin.html'; }
    else { err.textContent = data.error || 'Erreur de connexion'; btn.disabled = false; btn.textContent = 'Se connecter'; }
  } catch (e) { err.textContent = 'Erreur réseau'; btn.disabled = false; btn.textContent = 'Se connecter'; }
}
</script>
</body>
</html>
